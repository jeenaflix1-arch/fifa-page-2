<title>JeenaFlix — FIFA World Cup 2026 · Live Sports Channels</title>

<style>
  :root{--brand:#e11d2e;--brand-glow:rgba(225,29,46,.45);--fg:#fafafa;--muted:#9b9b9b;--cyan:#22d3ee}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Rajdhani',system-ui,sans-serif;background:radial-gradient(60% 80% at 50% 0,rgba(225,29,46,.3),transparent 70%),#050505;color:var(--fg);min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:14px}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;text-align:center;font-size:36px;letter-spacing:3px;padding:14px 0 6px}
  .logo .r{color:var(--brand);text-shadow:0 0 18px var(--brand-glow)}
  .logo .s{background:linear-gradient(180deg,#fff 30%,#777);-webkit-background-clip:text;color:transparent}
  .tagline{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
  .tab{background:transparent;border:1px solid var(--brand);color:var(--fg);padding:8px 4px;border-radius:999px;font-weight:700;font-size:11px;text-transform:uppercase;cursor:pointer}
  .tab.active{background:var(--brand);box-shadow:0 0 14px var(--brand-glow)}
  .day-header{font-family:'Orbitron',sans-serif;font-weight:900;font-size:14px;letter-spacing:2px;color:var(--brand);margin:18px 0 10px;text-transform:uppercase;padding-left:6px;border-left:3px solid var(--brand)}
  .card{background:linear-gradient(180deg,rgba(20,8,8,.95),rgba(5,5,5,.95));border:1px solid var(--brand);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 0 14px var(--brand-glow);cursor:pointer;transition:.15s}
  .card:hover{transform:scale(1.01)}
  .league{text-align:center;font-weight:700;margin-bottom:10px;font-size:13px;color:#fff}
  .league::before{content:"📺 ";color:var(--brand)}
  .row{display:grid;grid-template-columns:1fr 1.1fr 1fr;align-items:center;gap:6px}
  .team{display:flex;flex-direction:column;align-items:center;gap:6px}
  .flag{width:56px;height:56px;border-radius:50%;border:2px solid;display:grid;place-items:center;background:#000;overflow:hidden}
  .flag img{width:100%;height:100%;object-fit:cover}
  .tname{font-size:12px;font-weight:700;text-align:center;line-height:1.1}
  .mid{text-align:center}
  .time{font-size:18px;font-weight:800;color:#fff}
  .date{color:var(--cyan);font-weight:700;font-size:13px}
  .venue{font-size:10px;color:var(--muted);margin-top:4px;text-align:center;line-height:1.2}
  .live-badge{display:inline-block;background:var(--brand);padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;margin-top:4px;box-shadow:0 0 12px var(--brand-glow);animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .countdown{text-align:center;margin-top:10px;font-weight:700;font-size:14px}
  .countdown b{color:var(--cyan);font-variant-numeric:tabular-nums}
  .hidden{display:none!important}
  .back{background:transparent;border:1px solid var(--brand);color:var(--fg);padding:6px 14px;border-radius:999px;font-weight:700;cursor:pointer;margin-bottom:10px}
  .player-wrap{position:relative;aspect-ratio:16/9;background:#000;border-radius:16px;overflow:hidden;border:1px solid var(--brand);box-shadow:0 0 18px var(--brand-glow)}
  video{width:100%;height:100%;display:block;background:#000}
  .now{text-align:center;color:var(--muted);margin:8px 0 14px;font-size:13px}
  .now b{color:var(--fg)}
  .section-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:20px;margin:18px 0 10px;letter-spacing:1px;display:flex;align-items:center;gap:8px}
  .section-title .red{color:var(--brand)}
  .section-title .silver{background:linear-gradient(180deg,#fff,#888);-webkit-background-clip:text;color:transparent}
  .server{background:linear-gradient(180deg,rgba(20,8,8,.95),rgba(5,5,5,.95));border:1px solid var(--brand);border-radius:14px;padding:8px;margin-bottom:10px;display:flex;align-items:center;gap:8px;overflow-x:auto;box-shadow:0 0 10px var(--brand-glow)}
  .server-name{color:var(--brand);font-weight:900;font-size:13px;letter-spacing:1px;white-space:nowrap;padding:0 6px}
  .server-name::before{content:"▶ "}
  .chans{display:flex;gap:8px;flex:1}
  .chan{flex:0 0 auto;min-width:110px;max-width:140px;background:#1a0d0d;border:1px solid rgba(225,29,46,.5);color:var(--fg);padding:8px 6px;border-radius:10px;font-weight:800;font-size:10px;text-transform:uppercase;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;line-height:1.15}
  .chan .clogo{width:48px;height:48px;border-radius:8px;background:#000 center/contain no-repeat;border:1px solid rgba(225,29,46,.35);flex:0 0 auto;display:grid;place-items:center;font-size:18px;color:var(--brand)}
  .chan .cname{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
  .chan.active{background:var(--brand);box-shadow:0 0 10px var(--brand-glow)}
  .chan.active .clogo{border-color:#fff}
  .err{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.85);text-align:center;padding:20px;font-size:14px}
  .err a{display:inline-block;margin-top:10px;background:var(--brand);color:#fff;padding:8px 16px;border-radius:999px;text-decoration:none;font-weight:800;font-size:12px}
  .loader{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.7)}
  .spinner{width:40px;height:40px;border:3px solid var(--brand);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .score-wrap{display:flex;align-items:center;justify-content:space-between;background:rgba(20,8,8,.7);border-radius:12px;padding:8px 12px;margin-bottom:10px}

  .sticky-head{position:sticky;top:0;z-index:50;background:radial-gradient(60% 120% at 50% 0,rgba(50,5,8,.98),#050505 80%);padding-top:6px;padding-bottom:6px;backdrop-filter:blur(6px);margin:-14px -14px 10px;padding-left:14px;padding-right:14px}
</style>
</head>

MATCHES.forEach((m,i)=>{ m.id='m'+i; const t=new Date(m.kickoff).getTime(); const now=Date.now();
  if(t+115*60*1000 < now) m.status='finished';
  else if(t <= now) m.status='live';
  else m.status='upcoming';
});

let currentTab='all', currentChan=SERVERS[0].channels[0], hls=null;

function renderTabs(){
  const c={all:MATCHES.length,live:MATCHES.filter(m=>m.status==='live').length,upcoming:MATCHES.filter(m=>m.status==='upcoming').length,finished:MATCHES.filter(m=>m.status==='finished').length};
  document.getElementById('tabs').innerHTML=['all','live','upcoming','finished'].map(t=>`<button class="tab ${currentTab===t?'active':''}" onclick="setTab('${t}')">${currentTab===t?'✓ ':''}${t.toUpperCase()} (${c[t]})</button>`).join('');
}
function setTab(t){currentTab=t;renderTabs();renderList()}
function fmtTime(iso){return new Date(iso).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:true})}
function fmtDate(iso){return new Date(iso).toLocaleDateString('en-GB')}
function fmtDay(iso){return new Date(iso).toLocaleDateString([],{weekday:'long',day:'numeric',month:'long'})}

function renderList(){
  const filtered=MATCHES.filter(m=>currentTab==='all'||m.status===currentTab);
  let lastDay='';
  let html='';
  filtered.forEach(m=>{
    const day=new Date(m.kickoff).toDateString();
    if(day!==lastDay){lastDay=day; html+=`<div class="day-header">${fmtDay(m.kickoff)}</div>`}
    let mid;
    if(m.status==='live'){mid=`<div class="time">LIVE</div><span class="live-badge">● ON AIR</span>`}
    else if(m.status==='finished'){mid=`<div class="time">FT</div><div class="date" style="color:#888">Finished</div>`}
    else{mid=`<div class="time">${fmtTime(m.kickoff)}</div><div class="date">${fmtDate(m.kickoff)}</div>`}
    let bot='';
    if(m.status==='upcoming') bot=`<div class="countdown" data-cd="${m.kickoff}">Starts in <b>--:--</b></div>`;
    else if(m.status==='live') bot='<div class="countdown" style="color:var(--brand)">▶ Watch now</div>';
    else bot=`<div class="countdown" style="color:#888">Finished</div>`;
    html+=`<div class="card" onclick="openWatch('${m.id}')">
      <div class="league">Football | | FIFA World Cup 2026</div>
      <div class="row">
        <div class="team"><div class="flag" style="border-color:${m.home.color};box-shadow:0 0 14px ${m.home.color}66"><img src="${m.home.flag}" alt=""></div><div class="tname">${m.home.name}</div></div>
        <div class="mid">${mid}<div class="venue">${m.venue}</div></div>
        <div class="team"><div class="flag" style="border-color:${m.away.color};box-shadow:0 0 14px ${m.away.color}66"><img src="${m.away.flag}" alt=""></div><div class="tname">${m.away.name}</div></div>
      </div>
      ${bot}
    </div>`;
  });
  document.getElementById('list').innerHTML=html||'<p style="text-align:center;color:#888;padding:40px">No matches.</p>';
}

setInterval(()=>{document.querySelectorAll('[data-cd]').forEach(el=>{
  const ms=new Date(el.dataset.cd).getTime()-Date.now();
  if(ms<=0){el.innerHTML='<b style="color:var(--brand)">Starting now</b>';return}
  const s=Math.floor(ms/1000),d=Math.floor(s/86400),h=Math.floor(s%86400/3600),mn=Math.floor(s%3600/60),sc=s%60;
  const p=n=>String(n).padStart(2,'0');
  const t=d>0?`${d}d ${p(h)}:${p(mn)}:${p(sc)}`:h>0?`${p(h)}:${p(mn)}:${p(sc)}`:`${p(mn)}:${p(sc)}`;
  el.innerHTML=`Starts in <b>${t}</b>`;
});},1000);

function openWatch(id){
  const m=MATCHES.find(x=>x.id===id);
  document.getElementById('home').classList.add('hidden');
  document.getElementById('watch-header').classList.remove('hidden');
  document.getElementById('watch').classList.remove('hidden');
  document.getElementById('scorebar').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px"><img src="${m.home.flag}" style="width:24px;height:24px;border-radius:50%;object-fit:cover"><b>${m.home.name}</b></div>
    <div style="font-weight:800">${m.status==='live'?'<span style="color:var(--brand)">● LIVE</span>':fmtTime(m.kickoff)+' · '+fmtDate(m.kickoff)}</div>
    <div style="display:flex;align-items:center;gap:8px"><b>${m.away.name}</b><img src="${m.away.flag}" style="width:24px;height:24px;border-radius:50%;object-fit:cover"></div>`;
  renderServers();
  playChannel(SERVERS[0].channels[0]);
  window.scrollTo(0,0);
}
function showHome(){
  document.getElementById('watch').classList.add('hidden');
  document.getElementById('watch-header').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  if(hls){hls.destroy();hls=null}
  const v=document.getElementById('video');v.pause();v.removeAttribute('src');v.load();
}
function renderServers(){
  document.getElementById('servers').innerHTML=SERVERS.map(s=>`
    <div class="server"><div class="server-name">${s.name}</div><div class="chans">
      ${s.channels.map(c=>{
        const logo = c.logo ? `<div class="clogo" style="background-image:url('${c.logo.replace(/'/g,"%27")}')"></div>` : `<div class="clogo">📺</div>`;
        const data = JSON.stringify(c).replace(/'/g,"&#39;");
        return `<button class="chan ${c.url===currentChan.url?'active':''}" onclick='playChannel(${data})' title="${c.name.replace(/"/g,'&quot;')}">${logo}<span class="cname">${c.name}</span></button>`;
      }).join('')}
    </div></div>`).join('');
}
function hide(id){document.getElementById(id).classList.add('hidden')}
function show(id){document.getElementById(id).classList.remove('hidden')}
function playChannel(c){
  currentChan=c;
  document.getElementById('now-name').textContent=c.name;
  hide('err'); show('loader');
  renderServers();
  const v=document.getElementById('video');
  if(hls){try{hls.destroy()}catch(e){}hls=null}
  try{v.pause();v.removeAttribute('src');v.src='';v.load();}catch(e){}
  v.muted=true; v.defaultMuted=true; v.autoplay=true; v.playsInline=true; v.setAttribute('playsinline',''); v.setAttribute('webkit-playsinline','');
  v.onplaying=()=>hide('loader');
  v.onloadedmetadata=()=>{v.play().catch(()=>{});};
  v.onloadeddata=()=>hide('loader');
  v.oncanplay=()=>{hide('loader');v.play().catch(()=>{});};
  v.onerror=()=>showErr('Stream failed to load. Try another server/channel.');
  function showErr(msg){
    hide('loader'); show('err');
    document.getElementById('err').innerHTML=`<div>⚠️ ${msg}<br><a href="${c.url}" target="_blank">Open in external player</a></div>`;
  }
  if(c.url.startsWith('http://') && location.protocol==='https:') return showErr('This stream is HTTP and the browser blocks it on HTTPS. Open the HTML file directly/local, or choose an HTTPS channel.');
  const isHls = /\.m3u8(\?|$)/i.test(c.url);
  if(!isHls || v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=c.url; v.load(); v.play().catch(()=>{});
    return;
  }
  if(window.Hls && Hls.isSupported()){
    hls=new Hls({lowLatencyMode:true, enableWorker:true, maxBufferLength:30, liveSyncDurationCount:3});
    hls.attachMedia(v);
    hls.on(Hls.Events.MEDIA_ATTACHED,()=>hls.loadSource(c.url));
    hls.on(Hls.Events.MANIFEST_PARSED,()=>{ hide('loader'); v.play().catch(()=>{}); });
    hls.on(Hls.Events.ERROR,(_,d)=>{
      console.warn('hls err',d);
      if(d.fatal){
        if(d.type==='networkError') try{hls.startLoad()}catch(e){showErr('Stream unavailable (network/CORS blocked).')}
        else if(d.type==='mediaError'){ try{hls.recoverMediaError()}catch(e){showErr('Media error.')} }
        else showErr('Stream unavailable.');
      }
    });
  } else showErr('HLS not supported in this browser.');
}
renderTabs();renderList();
</script>
